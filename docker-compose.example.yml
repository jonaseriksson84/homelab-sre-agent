# Example deployment. Attach the agent to the same network as your
# Prometheus/Loki/Alertmanager stack and point an Alertmanager webhook
# receiver at http://sre-agent:8080/webhook — see docs/setup.md.
services:
  sre-agent:
    image: ghcr.io/jonaseriksson84/homelab-sre-agent:latest
    container_name: sre-agent
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SRE_NTFY_TOPIC: ${SRE_NTFY_TOPIC}
      SRE_LOKI_URL: http://loki:3100
      SRE_PROMETHEUS_URL: http://prometheus:9090
      SRE_DOCKER_PROXY_URL: http://docker-proxy:2375
      SRE_DB_PATH: /data/incidents.db
      # Optional MCP server. If enabled, bind the published port to the host's
      # Tailscale IP ONLY — no app auth by design (ADR-0002); the tailnet is
      # the boundary. Leave unset to disable.
      # SRE_MCP_LISTEN_ADDR: ":8082"
    # ports:
    #   - "100.x.y.z:8082:8082" # replace with `tailscale ip -4` on the host
    volumes:
      # Must be writable by the image's non-root user: chown 1000:1000 ./data
      - ./data:/data
    networks:
      - monitoring

  # GET-only socket proxy per ADR-0001: the agent never mounts the real socket.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1 # allow GET /containers/*
      POST: 0      # no mutating methods
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring

networks:
  monitoring:
    external: true # your existing monitoring stack's network
